apiVersion: v1
kind: ConfigMap
metadata:
  name: mis-homepage-config
  namespace: mishomepage
data:
  settings.yaml: |
    title: 🌿 MIS 運維指揮中心
    theme: dark
    color: slate
    cardBlur: sm
    layout:
      - 核心運維基礎設施:
          style: row
          columns: 3
          header: false
      - 運維支援與周邊:
          style: row
          columns: 2
          header: false

  kubernetes.yaml: |
    mode: cluster
    allowInsecure: true
    ingress: true

  widgets.yaml: |
    - greeting:
        text: "MIS同仁辛苦了，別忘了吃零食休息一下！"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format:
          dateStyle: "full"
          timeStyle: "short"
          hour12: true
    - openmeteo:
        label: "台中"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K8s-Lab2"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services.yaml: |
    - 核心運維基礎設施:
        - Kubernetes 叢集管理:
            - ArgoCD:
                icon: si-argo
                href: https://k8s-lab2-argocd.eagle.corp/
                widget:
                  type: argocd
                  url: https://k8s-lab2-argocd.eagle.corp
                  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhcmdvY2QiLCJzdWIiOiJob21lcGFnZS1yZWFkOmFwaUtleSIsIm5iZiI6MTc3NzUzNTc2NiwiaWF0IjoxNzc3NTM1NzY2LCJqdGkiOiI2N2MwYTRkMy02ZjhjLTQzOTMtYTg5NC01NzA1ZWQxMGVjMjMifQ.MAJfsPwRZaS6J_fvAsQFbUdvCTwBJLRJymBJP2p0Q2c"
                  allowInsecure: true
            - Rancher:
                icon: mdi-kubernetes
                href: https://k8s-lab2-rancher.eagle.corp/
                widget:
                  type: customapi
                  url: http://10.8.128.111:61211/workloads
                  refreshInterval: 10000
                  mappings:
                    - field: ns_count
                      label: NS
                    - field: pod_status
                      label: Pods (Run/Suc)
                    - field: workload_counts
                      label: D/S/D
                    - field: pod_health
                      label: 叢集健康度
            - Grafana:
                icon: si-grafana
                href: http://k8s-lab2-grafana.eagle.corp/
            - Prometheus:
                icon: si-prometheus
                href: http://k8s-lab2-prometheus.eagle.corp/
            - Jenkins:
                icon: si-jenkins
                href: http://k8s-lab2-jenkins.eagle.corp/
            - LAM:
                icon: mdi-account-cog
                href: http://k8s-lab2-lam.eagle.corp/
        - 防火牆與網路設備:
            - FortiGate FW:
                icon: si-fortinet
                href: https://10.8.28.11:54088
                ping: 10.8.28.11
            - PaloAlto FW:
                icon: si-paloaltonetworks
                href: https://10.8.28.10
                ping: 10.8.28.10
            - Omada AP:
                icon: si-omadacloud
                href: https://10.8.28.32
                ping: 10.8.28.32
            - Cloudflare:
                icon: si-cloudflare
                href: https://dash.cloudflare.com/login
            - GoDaddy:
                icon: si-godaddy
                href: https://www.godaddy.com/zh
        - 虛擬化與雲端架構:
            - vCenter:
                icon: si-vmware
                href: https://10.70.90.10/
                ping: 10.70.90.10
            - ESXi-12:
                icon: mdi-server
                href: https://10.70.90.12/
                ping: 10.70.90.12
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - field: esxi_10_70_90_12.cpu
                      label: CPU
                      format: percent
                    - field: esxi_10_70_90_12.mem
                      label: MEM
                      format: percent
            - ESXi-16:
                icon: mdi-server
                href: https://10.70.90.16/
                ping: 10.70.90.16
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - field: esxi_10_70_90_16.cpu
                      label: CPU
                      format: percent
                    - field: esxi_10_70_90_16.mem
                      label: MEM
                      format: percent
            - Synology-244:
                icon: si-synology
                href: http://10.8.100.244:5000
                widget:
                  type: diskstation
                  url: http://10.8.100.244:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
            - Synology-245:
                icon: si-synology
                href: http://10.8.100.245:5000
                widget:
                  type: diskstation
                  url: http://10.8.100.245:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
    - 運維支援與周邊:
        - 運維監控與資產管理:
            - Uptime Kuma:
                icon: si-uptimekuma
                href: https://uptime-kuma.eagle.corp/status/server-status
                widget:
                  type: uptimekuma
                  url: https://uptime-kuma.eagle.corp
                  slug: server-status
                  mappings:
                    - field: up
                      label: 在線
                    - field: down
                      label: 異常
                    - field: uptime
                      label: 可用率
                      format: percent
            - LibreNMS:
                icon: mdi-monitor-dashboard
                href: http://librenms.eagle.corp/
            - AssetTiger:
                icon: mdi-tag-multiple
                href: https://www.assettiger.com/dashboard
            - Bitwarden:
                icon: si-bitwarden
                href: https://vault.bitwarden.com/
        - 其他管理系統:
            - PBX 電話系統:
                icon: mdi-phone-voip
                href: https://10.8.8.150:8088/
                ping: 10.8.8.150
            - Sharp 印表機:
                icon: mdi-printer-settings
                href: http://10.8.28.100
                ping: 10.8.28.100
            - AD Web-103:
                icon: mdi-microsoft-windows
                href: http://10.8.128.103/
            - AD Web-105:
                icon: mdi-microsoft-windows
                href: http://10.8.128.105/

  custom.css: |
    /* 讓每個子群組都有一個明顯的毛玻璃外框 */
    .subgroup {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 25px !important;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    /* 螢光筆標題基礎樣式 */
    .subgroup-title {
      font-weight: 800 !important;
      padding: 4px 12px;
      border-radius: 4px;
      margin-bottom: 12px !important;
      display: inline-block;
      letter-spacing: 0.5px;
      color: #ffffff !important;
    }

    /* 核心運維 - 子區塊配色 */
    /* 1. K8s管理: 螢光電紫 */
    div[data-group="核心運維基礎設施"] .subgroup:nth-child(1) .subgroup-title {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 0 10px rgba(118, 75, 162, 0.6);
    }
    /* 2. 網路設備: 螢光烈焰 */
    div[data-group="核心運維基礎設施"] .subgroup:nth-child(2) .subgroup-title {
      background: linear-gradient(90deg, #ff8c00 0%, #ed1c24 100%);
      box-shadow: 0 0 10px rgba(237, 28, 36, 0.6);
    }
    /* 3. 虛擬化: 螢光極光綠 */
    div[data-group="核心運維基礎設施"] .subgroup:nth-child(3) .subgroup-title {
      background: linear-gradient(90deg, #00b09b 0%, #96c93d 100%);
      box-shadow: 0 0 10px rgba(150, 201, 61, 0.6);
    }

    /* 運維支援 - 子區塊配色 */
    /* 1. 監控資產: 藍寶石 */
    div[data-group="運維支援與周邊"] .subgroup:nth-child(1) .subgroup-title {
      background: linear-gradient(90deg, #2193b0 0%, #6dd5ed 100%);
      box-shadow: 0 0 10px rgba(33, 147, 176, 0.6);
    }
    /* 2. 其他管理: 玫瑰金 */
    div[data-group="運維支援與周邊"] .subgroup:nth-child(2) .subgroup-title {
      background: linear-gradient(90deg, #e94057 0%, #f27121 100%);
      box-shadow: 0 0 10px rgba(233, 64, 87, 0.6);
    }

    /* 卡片動態效果 */
    .service-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(255,255,255,0.1);
      transition: all 0.2s ease-in-out;
    }

  bookmarks.yaml: ""
  custom.yaml: ""
