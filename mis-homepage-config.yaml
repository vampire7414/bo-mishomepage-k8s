apiVersion: v1
kind: ConfigMap
metadata:
  name: mis-homepage-config
  namespace: mishomepage
data:
  settings.yaml: |
    title: 🌿 MIS 運維指揮中心
    theme: dark
    color: slate
    cardBlur: sm
    layout:
      - 核心運維基礎設施:
          style: row
          columns: 3
          header: false
      - 運維支援與周邊:
          style: row
          columns: 2
          header: false

  kubernetes.yaml: |
    mode: cluster
    allowInsecure: true
    ingress: true

  widgets.yaml: |
    - greeting:
        text: "MIS同仁辛苦了，別忘了吃零食休息一下！"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format: { dateStyle: "full", timeStyle: "short", hour12: true }
    - openmeteo:
        label: "台中"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5
    - kubernetes:
        cluster: { show: true, cpu: true, memory: true, label: "K8s-Lab2" }
        nodes: { show: true, cpu: true, memory: true }

  services.yaml: |
    - 核心運維基礎設施:
        - Kubernetes 叢集管理:
            - ArgoCD:
                id: argocd-card
                icon: si-argo
                href: https://k8s-lab2-argocd.eagle.corp/
                widget:
                  type: argocd
                  url: https://k8s-lab2-argocd.eagle.corp
                  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  allowInsecure: true
            - Rancher:
                id: rancher-card
                icon: mdi-kubernetes
                href: https://k8s-lab2-rancher.eagle.corp/
                widget:
                  type: customapi
                  url: http://10.8.128.111:61211/workloads
                  mappings:
                    - { field: ns_count, label: NS }
                    - { field: pod_status, label: Pods }
        - 防火牆與網路設備:
            - FortiGate FW:
                id: fortigate-card
                icon: si-fortinet
                href: https://10.8.28.11:54088
                ping: 10.8.28.11
            - PaloAlto FW:
                id: paloalto-card
                icon: si-paloaltonetworks
                href: https://10.8.28.10
                ping: 10.8.28.10
            - Omada AP:
                id: omada-card
                icon: si-omadacloud
                href: https://10.8.28.32
                ping: 10.8.28.32
        - 虛擬化與雲端架構:
            - vCenter:
                id: vcenter-card
                icon: si-vmware
                href: https://10.70.90.10/
                ping: 10.70.90.10
            - ESXi-12:
                id: esxi12-card
                icon: mdi-server
                href: https://10.70.90.12/
                ping: 10.70.90.12
            - ESXi-16:
                id: esxi16-card
                icon: mdi-server
                href: https://10.70.90.16/
                ping: 10.70.90.16
            - Synology-244:
                id: nas244-card
                icon: si-synology
                href: http://10.8.100.244:5000
    - 運維支援與周邊:
        - 運維監控與資產管理:
            - Uptime Kuma:
                id: uptime-card
                icon: si-uptimekuma
                href: https://uptime-kuma.eagle.corp/status/server-status
            - LibreNMS:
                id: librenms-card
                icon: mdi-monitor-dashboard
                href: http://librenms.eagle.corp/
        - 其他管理系統:
            - PBX 電話系統:
                id: pbx-card
                icon: mdi-phone-voip
                href: https://10.8.8.150:8088/

  custom.css: |
    /* --- 1. 全域滾輪隱藏 --- */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- 2. 圓角主樣式 (Master Rounded Corners) --- */
    .service-card, .bookmark-card, .group-header,
    div[id$="-card"], div[id$="-card"] > div,
    div[class*="rounded-lg"] {
        border-radius: 20px !important;
        overflow: hidden !important;
        isolation: isolate !important;
    }

    /* --- 3. 卡片著色容器設定 --- */
    #argocd-card, #rancher-card, #fortigate-card, #paloalto-card, #omada-card,
    #vcenter-card, #esxi12-card, #esxi16-card, #nas244-card, #uptime-card,
    #librenms-card, #pbx-card {
        position: relative !important;
        background-color: transparent !important;
    }

    /* 建立背景層 */
    [id$="-card"]::before {
        content: "";
        position: absolute;
        top: 2px; left: 2px; right: 2px; bottom: 4px;
        z-index: 0;
        border-radius: 18px !important;
        opacity: 0.25; /* 控制顏色深淺 */
    }

    /* --- 4. MIS 專屬顏色分配 --- */
    /* K8s 相關 (紫色調) */
    #argocd-card::before, #rancher-card::before { background-color: #A855F7 !important; }
    
    /* 網路與防火牆 (紅色/橘色調) */
    #fortigate-card::before { background-color: #EF4444 !important; }
    #paloalto-card::before  { background-color: #F97316 !important; }
    #omada-card::before     { background-color: #3B82F6 !important; }

    /* 虛擬化與伺服器 (藍色/青色調) */
    #vcenter-card::before   { background-color: #0EA5E9 !important; }
    #esxi12-card::before, #esxi16-card::before { background-color: #2DD4BF !important; }
    #nas244-card::before    { background-color: #6366F1 !important; }

    /* 監控與周邊 (綠色/灰色調) */
    #uptime-card::before    { background-color: #22C55E !important; }
    #librenms-card::before  { background-color: #84CC16 !important; }
    #pbx-card::before       { background-color: #94A3B8 !important; }

    /* --- 5. 狀態標籤美化 (Status Badge) --- */
    span[class*="status-"], .service-ping .ping-status {
        border-radius: 8px !important;
        background-color: rgba(0, 0, 0, 0.3) !important;
        backdrop-filter: blur(4px);
        font-size: 10px !important;
        font-weight: 800 !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    /* 內容置頂於背景之上 */
    .service-card > div { position: relative; z-index: 1; }

    /* --- 6. 標題與文字顏色微調 --- */
    .service-name { font-weight: 700 !important; color: #FFFFFF !important; }
    .service-description { color: rgba(255, 255, 255, 0.6) !important; }

  bookmarks.yaml: ""
  custom.yaml: ""
