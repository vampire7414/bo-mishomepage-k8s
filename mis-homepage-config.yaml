                    - { field: down, label: 異常 }
                    - { field: uptime, label: 可用率, format: percent }
            - LibreNMS:
                id: librenms-card
                icon: mdi-monitor-dashboard
                href: http://librenms.eagle.corp/
            - AssetTiger:
                id: assettiger-card
                icon: mdi-tag-multiple
                href: https://www.assettiger.com/dashboard
            - Bitwarden:
                id: bitwarden-card
                icon: si-bitwarden
                href: https://vault.bitwarden.com/
        - 其他管理系統:
            - PBX 電話系統:
                id: pbx-card
                icon: mdi-phone-voip
                href: https://10.8.8.150:8088/
                ping: 10.8.8.150
            - Sharp 印表機:
                id: printer-card
                icon: mdi-printer-settings
                href: http://10.8.28.100
                ping: 10.8.28.100
            - AD Web-103:
                id: ad103-card
                icon: mdi-microsoft-windows
                href: http://10.8.128.103/
            - AD Web-105:
                id: ad105-card
                icon: mdi-microsoft-windows
                href: http://10.8.128.105/

  custom.css: |
    /* --- 全域隱藏滾輪 --- */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- Reddit 圓角樣式 --- */
    .service-card, .bookmark-card, .group-header,
    div[id$="-card"], div[id$="-card"] > div,
    div[class*="rounded-lg"] {
        border-radius: 20px !important;
        overflow: hidden !important;
        isolation: isolate !important;
    }

    /* --- 背景染色容器設定 --- */
    [id$="-card"] {
        position: relative !important;
        background-color: transparent !important;
    }

    /* 建立彩色底層 */
    [id$="-card"]::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 0;
        opacity: 0.15; /* 輕微染色感 */
        transition: opacity 0.3s ease;
    }

    /* 滑鼠懸停時加深顏色 */
    [id$="-card"]:hover::before {
        opacity: 0.3;
    }

    /* --- 針對 ID 分配顏色 --- */
    /* K8s 管理 (紫色) */
    #argocd-card::before, #rancher-card::before, #jenkins-card::before, #lam-card::before { background-color: #A855F7 !important; }
    /* 監控分析 (橘色) */
    #grafana-card::before, #prometheus-card::before, #uptime-card::before, #librenms-card::before { background-color: #F97316 !important; }
    /* 網路設備 (紅色) */
    #fortigate-card::before, #paloalto-card::before, #cloudflare-card::before { background-color: #EF4444 !important; }
    /* 虛擬化 (藍色) */
    #vcenter-card::before, #esxi12-card::before, #esxi16-card::before { background-color: #3B82F6 !important; }
    /* 存儲與資產 (青綠) */
    #nas244-card::before, #nas245-card::before, #assettiger-card::before { background-color: #06B6D4 !important; }
    /* 其他與 Windows (藍灰色) */
    #pbx-card::before, #printer-card::before, #ad103-card::before, #ad105-card::before, #bitwarden-card::before { background-color: #64748B !important; }

    /* 確保內容在偽元素之上 */
    .service-card > div { position: relative; z-index: 1; }

    /* 美化標記 (Ping Status) */
    span.status-dot { width: 8px !important; height: 8px !important; }

  bookmarks.yaml: ""
  custom.yaml: ""
