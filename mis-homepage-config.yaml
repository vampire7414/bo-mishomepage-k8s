apiVersion: v1
kind: ConfigMap
metadata:
  name: mis-homepage-config
  namespace: mishomepage
data:
  settings.yaml: |
    title: 🌿 MIS 運維指揮中心
    theme: dark
    color: slate
    cardBlur: sm
    layout:
      - 核心運維基礎設施:
          style: row
          columns: 3
          header: false
      - 運維支援與周邊:
          style: row
          columns: 3
          header: false

  kubernetes.yaml: |
    mode: cluster
    allowInsecure: true
    ingress: true

  widgets.yaml: |
    - greeting:
        text: "MIS同仁辛苦了，別忘了吃零食休息一下！"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format: { dateStyle: "full", timeStyle: "short", hour12: true }
    - openmeteo:
        label: "台中"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5
    - kubernetes:
        cluster: { show: true, cpu: true, memory: true, label: "K8s-Lab2" }
        nodes: { show: true, cpu: true, memory: true }

  services.yaml: |
    - 核心運維基礎設施:
        - Kubernetes 叢集管理:
            - ArgoCD:
                id: argocd-card
                icon: sh-argo-cd.svg
                href: https://k8s-lab2-argocd.eagle.corp/
                description: "應用程式持續交付"
                widget:
                  type: argocd
                  url: https://k8s-lab2-argocd.eagle.corp
                  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhcmdvY2QiLCJzdWIiOiJob21lcGFnZS1yZWFkOmFwaUtleSIsIm5iZiI6MTc3NzUzNTc2NiwiaWF0IjoxNzc3NTM1NzY2LCJqdGkiOiI2N2MwYTRkMy02ZjhjLTQzOTMtYTg5NC01NzA1ZWQxMGVjMjMifQ.MAJfsPwRZaS6J_fvAsQFbUdvCTwBJLRJymBJP2p0Q2c"
                  allowInsecure: true
            - Rancher:
                id: rancher-card
                icon: sh-rancher.svg
                href: https://k8s-lab2-rancher.eagle.corp/
                widget:
                  type: customapi
                  url: http://10.8.128.111:61211/workloads
                  refreshInterval: 10000
                  mappings:
                    - { field: ns_count, label: NS }
                    - { field: pod_status, label: Pods (Run/Suc) }
                    - { field: workload_counts, label: D / STS / DS }
                    - { field: pod_health, label: 叢集健康度 }
            - Grafana:
                id: grafana-card
                icon: sh-grafana.svg
                href: http://k8s-lab2-grafana.eagle.corp/
            - Prometheus:
                id: prometheus-card
                icon: sh-prometheus.svg
                href: http://k8s-lab2-prometheus.eagle.corp/
            - Jenkins:
                id: jenkins-card
                icon: sh-jenkins.svg
                href: http://k8s-lab2-jenkins.eagle.corp/
            - AD Web - Production (K8s):
                id: lam-card
                icon: sh-microsoft-azure.webp
                href: http://k8s-lab2-lam.eagle.corp/
                description: "K8s Container / 正式運行環境"
        - 防火牆與網路設備:
            - FortiGate FW:
                id: fortigate-card
                icon: sh-fortinet.webp
                href: https://10.8.28.11:54088
                statusStyle: "dot"
                ping: 10.8.28.11
            - PaloAlto FW:
                id: paloalto-card
                icon: sh-palo-alto-networks.webp
                href: https://10.8.28.10
                statusStyle: "dot"
                ping: 10.8.28.10
            - Omada AP:
                id: omada-card
                icon: sh-omada.svg
                href: https://10.8.28.32
                statusStyle: "dot"
                ping: 10.8.28.32
                description: "TP-Link Omada Controller"
            - Cloudflare:
                id: cloudflare-card
                icon: sh-cloudflare.svg
                href: https://dash.cloudflare.com/login
            - GoDaddy:
                id: godaddy-card
                icon: si-godaddy-#ff9800
                href: https://www.godaddy.com/zh
            - API 伺服器哨兵:
                icon: sh-swagger.webp
                widget:
                  type: customapi
                  url: http://10.8.128.111:4999/scan
                  refreshInterval: 30000
                  display: dynamic-list
                  mappings:
                    name: line1
                    label: line2
                    format: text
                    limit: 10
        - 虛擬化與雲端架構:
            - vCenter:
                id: vcenter-card
                icon: sh-vmware-esx.svg
                href: https://10.70.90.10/
                statusStyle: "dot"
                ping: 10.70.90.10
            - ESXi-12:
                id: esxi12-card
                icon: sh-vmware-esx.svg
                href: https://10.70.90.12/
                statusStyle: "dot"
                ping: 10.70.90.12
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - { field: esxi_10_70_90_12.cpu, label: CPU, format: percent }
                    - { field: esxi_10_70_90_12.mem, label: MEM, format: percent }
            - ESXi-16:
                id: esxi16-card
                icon: sh-vmware-esx.svg
                href: https://10.70.90.16/
                statusStyle: "dot"
                ping: 10.70.90.16
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - { field: esxi_10_70_90_16.cpu, label: CPU, format: percent }
                    - { field: esxi_10_70_90_16.mem, label: MEM, format: percent }
            - Synology-244:
                id: nas244-card
                icon: sh-synology.svg
                href: http://10.8.100.244:5000
                statusStyle: "dot"
                widget:
                  type: diskstation
                  url: http://10.8.100.244:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
            - Synology-245:
                id: nas245-card
                icon: sh-synology.svg
                href: http://10.8.100.245:5000
                statusStyle: "dot"
                widget:
                  type: diskstation
                  url: http://10.8.100.245:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
    - 運維支援與周邊:
        - 運維監控與資產管理:
            - Uptime Kuma:
                id: uptime-card
                icon: sh-uptime-kuma.svg
                href: https://uptime-kuma.eagle.corp/status/server-status
                widget:
                  type: uptimekuma
                  url: https://uptime-kuma.eagle.corp
                  slug: server-status
                  refreshInterval: 10000
                  mappings:
                    - { field: up, label: 在線 }
                    - { field: down, label: 異常 }
                    - { field: uptime, label: 可用率, format: percent }
            - LibreNMS:
                id: librenms-card
                icon: sh-librenms.svg
                href: http://librenms.eagle.corp/
            - AssetTiger:
                id: assettiger-card
                icon: mdi-tag-multiple-#ff9800
                href: https://www.assettiger.com/dashboard
                description: "資產管理系統"
            - Bitwarden:
                id: bitwarden-card
                icon: sh-bitwarden.svg
                href: https://vault.bitwarden.com/
                description: "密碼庫"
        - 其他管理系統:
            - PBX 電話系統:
                id: pbx-card
                icon: mdi-phone-voip-#4caf50
                href: https://10.8.8.150:8088/
                statusStyle: "dot"
                ping: 10.8.8.150
                description: "Yeastar S20 EAGLE"
            - Sharp 印表機:
                id: printer-card
                icon: mdi-printer-settings-#ff9800
                href: http://10.8.28.100
                statusStyle: "dot"
                ping: 10.8.28.100
                description: "MX-2651 管理頁面"
            - AD Web - Legacy Dev (103):
                id: ad103-card
                icon: sh-microsoft-azure.webp
                href: http://10.8.128.103/
                description: "Docker Compose / 原始開發 (一號機)"
            - AD Web - Beta (105):
                id: ad105-card
                icon: sh-microsoft-azure.webp
                href: http://10.8.128.105/
                description: "Docker Compose / 優化測試 (二號機)"
        - 帳號安全管理:
            - 密碼過期預警:
                id: pwd-expiry-card
                icon: mdi-key-alert-#f44336
                widget:
                  type: customapi
                  url: http://k8s-lab2-lam.eagle.corp/api/user/expiring-passwords
                  method: POST
                  display: dynamic-list
                  mappings:
                    items: result
                    name: SamAccountName
                    label: Status
                    format: text
                    limit: 10

  custom.css: |
    /* --- 1. 全域滾輪隱藏 --- */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- 2. 圓角主樣式 --- */
    .service-card, .bookmark-card, .group-header,
    div[id$="-card"], div[id$="-card"] > div,
    div[class*="rounded-lg"] {
        border-radius: 25px !important;
        overflow: hidden !important;
        isolation: isolate !important;
    }

    /* --- 3. 卡片著色容器設定 --- */
    #argocd-card, #rancher-card, #grafana-card, #prometheus-card, #jenkins-card, #lam-card,
    #fortigate-card, #paloalto-card, #omada-card, #cloudflare-card, #godaddy-card,
    #vcenter-card, #esxi12-card, #esxi16-card, #nas244-card, #nas245-card,
    #uptime-card, #librenms-card, #assettiger-card, #bitwarden-card,
    #pbx-card, #printer-card, #ad103-card, #ad105-card, #pwd-expiry-card {
        position: relative !important;
        background-color: transparent !important;
    }

    /* 建立彩色底層 (關鍵修正：pointer-events: none 解決點擊問題) */
    [id$="-card"]::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        right: 2px;
        bottom: 6px;
        z-index: 0;
        border-radius: 23px !important;
        opacity: 0.2;
        pointer-events: none !important; /* 讓點擊直接穿透到底層連結 */
    }

    /* --- 4. 服務顏色分配 --- */
    /* K8s 與 持續整合 (精緻紫) */
    #argocd-card::before, #rancher-card::before, #jenkins-card::before, #lam-card::before { background-color: #a855f7 !important; }
    /* 監控與分析 (天空藍) */
    #grafana-card::before, #prometheus-card::before, #librenms-card::before { background-color: #3b82f6 !important; }
    /* 網路安全與過期警告 (科技紅) */
    #fortigate-card::before, #paloalto-card::before, #cloudflare-card::before, #godaddy-card::before, #pwd-expiry-card::before { background-color: #f43f5e !important; }
    /* 虛擬化平台 (琥珀橘) */
    #vcenter-card::before, #esxi12-card::before, #esxi16-card::before { background-color: #f59e0b !important; }
    /* 儲存與監控狀態 (翡翠綠) */
    #nas244-card::before, #nas245-card::before, #uptime-card::before { background-color: #10b981 !important; }
    /* 其他管理設備 (石板藍灰) */
    #pbx-card::before, #printer-card::before, #ad103-card::before, #ad105-card::before, #bitwarden-card::before, #assettiger-card::before { background-color: #94a3b8 !important; }

    /* --- 5. 確保內容層級 --- */
    .service-card > div, .service-card > a {
        position: relative !important;
        z-index: 1 !important;
    }

    .service-ping .ping-status {
        background-color: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        border-radius: 8px !important;
        padding: 2px 6px !important;
        position: absolute !important;
        top: 10px !important;
        right: 12px !important;
    }

    .service-ping .ping-status div {
        font-size: 9px !important;
        font-weight: 800 !important;
        text-transform: uppercase !important;
    }

    /* --- 6. 頂部導航欄美化 --- */
    #tabs ul {
        background-color: rgba(58, 58, 58, 0.2) !important;
        border-radius: 50px !important;
        padding: 4px !important;
        width: fit-content !important;
        margin: 0 auto !important;
    }

    #tabs ul li button[aria-selected="true"] {
        background-color: rgba(255, 255, 255, 0.1) !important;
        color: #6aabbf !important;
        border-radius: 50px !important;
        font-weight: bold !important;
    }

    /* --- 7. 系統監控漸層條 --- */
    .information-widget-resource div[style*="width"] {
        background: linear-gradient(90deg, #4ade80 0%, #2dd4bf 40%, #3b82f6 75%, #b80fde 100%) !important;
        opacity: 0.5 !important;
        border-radius: 10px !important;
    }

    /* --- 8. 字體顏色微調 --- */
    .service-name { color: #ffffff !important; font-weight: 700 !important; }
    .service-description { color: rgba(255, 255, 255, 0.5) !important; }

  bookmarks.yaml: ""
  custom.yaml: ""
