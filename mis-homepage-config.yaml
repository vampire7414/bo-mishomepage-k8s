apiVersion: v1
kind: ConfigMap
metadata:
  name: mis-homepage-config
  namespace: mishomepage
data:
  settings.yaml: |
    title: 🌿 MIS 運維指揮中心
    theme: dark
    color: slate
    cardBlur: sm
    layout:
      - 核心運維基礎設施:
          style: row
          columns: 3
          header: false
      - 運維支援與周邊:
          style: row
          columns: 2
          header: false

  kubernetes.yaml: |
    mode: cluster
    allowInsecure: true
    ingress: true

  widgets.yaml: |
    - greeting:
        text: "MIS同仁辛苦了，別忘了吃零食休息一下！"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format: { dateStyle: "full", timeStyle: "short", hour12: true }
    - openmeteo:
        label: "台中"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5
    - kubernetes:
        cluster: { show: true, cpu: true, memory: true, label: "K8s-Lab2" }
        nodes: { show: true, cpu: true, memory: true }

  services.yaml: |
    - 核心運維基礎設施:
        - Kubernetes 叢集管理:
            - ArgoCD:
                id: argocd-card
                icon: si-argo
                href: https://k8s-lab2-argocd.eagle.corp/
                description: "應用程式持續交付"
                widget:
                  type: argocd
                  url: https://k8s-lab2-argocd.eagle.corp
                  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhcmdvY2QiLCJzdWIiOiJob21lcGFnZS1yZWFkOmFwaUtleSIsIm5iZiI6MTc3NzUzNTc2NiwiaWF0IjoxNzc3NTM1NzY2LCJqdGkiOiI2N2MwYTRkMy02ZjhjLTQzOTMtYTg5NC01NzA1ZWQxMGVjMjMifQ.MAJfsPwRZaS6J_fvAsQFbUdvCTwBJLRJymBJP2p0Q2c"
                  allowInsecure: true
            - Rancher:
                id: rancher-card
                icon: mdi-kubernetes
                href: https://k8s-lab2-rancher.eagle.corp/
                widget:
                  type: customapi
                  url: http://10.8.128.111:61211/workloads
                  refreshInterval: 10000
                  mappings:
                    - { field: ns_count, label: NS }
                    - { field: pod_status, label: Pods (Run/Suc) }
                    - { field: workload_counts, label: D / STS / DS }
                    - { field: pod_health, label: 叢集健康度 }
            - Grafana:
                id: grafana-card
                icon: si-grafana
                href: http://k8s-lab2-grafana.eagle.corp/
            - Prometheus:
                id: prometheus-card
                icon: si-prometheus
                href: http://k8s-lab2-prometheus.eagle.corp/
            - Jenkins:
                id: jenkins-card
                icon: si-jenkins
                href: http://k8s-lab2-jenkins.eagle.corp/
            - LAM:
                id: lam-card
                icon: mdi-account-cog
                href: http://k8s-lab2-lam.eagle.corp/
        - 防火牆與網路設備:
            - FortiGate FW:
                id: fortigate-card
                icon: si-fortinet
                href: https://10.8.28.11:54088
                statusStyle: "dot"
                ping: 10.8.28.11
            - PaloAlto FW:
                id: paloalto-card
                icon: si-paloaltonetworks
                href: https://10.8.28.10
                statusStyle: "dot"
                ping: 10.8.28.10
            - Omada AP:
                id: omada-card
                icon: si-omadacloud
                href: https://10.8.28.32
                statusStyle: "dot"
                ping: 10.8.28.32
                description: "TP-Link Omada Controller"
            - Cloudflare:
                id: cloudflare-card
                icon: si-cloudflare
                href: https://dash.cloudflare.com/login
            - GoDaddy:
                id: godaddy-card
                icon: si-godaddy
                href: https://www.godaddy.com/zh
        - 虛擬化與雲端架構:
            - vCenter:
                id: vcenter-card
                icon: si-vmware
                href: https://10.70.90.10/
                statusStyle: "dot"
                ping: 10.70.90.10
            - ESXi-12:
                id: esxi12-card
                icon: mdi-server
                href: https://10.70.90.12/
                statusStyle: "dot"
                ping: 10.70.90.12
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - { field: esxi_10_70_90_12.cpu, label: CPU, format: percent }
                    - { field: esxi_10_70_90_12.mem, label: MEM, format: percent }
            - ESXi-16:
                id: esxi16-card
                icon: mdi-server
                href: https://10.70.90.16/
                statusStyle: "dot"
                ping: 10.70.90.16
                widget:
                  type: customapi
                  url: http://10.8.128.111:61210/stats
                  mappings:
                    - { field: esxi_10_70_90_16.cpu, label: CPU, format: percent }
                    - { field: esxi_10_70_90_16.mem, label: MEM, format: percent }
            - Synology-244:
                id: nas244-card
                icon: si-synology
                href: http://10.8.100.244:5000
                statusStyle: "dot"
                widget:
                  type: diskstation
                  url: http://10.8.100.244:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
            - Synology-245:
                id: nas245-card
                icon: si-synology
                href: http://10.8.100.245:5000
                statusStyle: "dot"
                widget:
                  type: diskstation
                  url: http://10.8.100.245:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
    - 運維支援與周邊:
        - 運維監控與資產管理:
            - Uptime Kuma:
                id: uptime-card
                icon: si-uptimekuma
                href: https://uptime-kuma.eagle.corp/status/server-status
                widget:
                  type: uptimekuma
                  url: https://uptime-kuma.eagle.corp
                  slug: server-status
                  refreshInterval: 10000
                  mappings:
                    - { field: up, label: 在線 }
                    - { field: down, label: 異常 }
                    - { field: uptime, label: 可用率, format: percent }
            - LibreNMS:
                id: librenms-card
                icon: mdi-monitor-dashboard
                href: http://librenms.eagle.corp/
            - AssetTiger:
                id: assettiger-card
                icon: mdi-tag-multiple
                href: https://www.assettiger.com/dashboard
                description: "資產管理系統"
            - Bitwarden:
                id: bitwarden-card
                icon: si-bitwarden
                href: https://vault.bitwarden.com/
                description: "密碼庫"
        - 其他管理系統:
            - PBX 電話系統:
                id: pbx-card
                icon: mdi-phone-voip
                href: https://10.8.8.150:8088/
                statusStyle: "dot"
                ping: 10.8.8.150
                description: "Yeastar S20 EAGLE"
            - Sharp 印表機:
                id: printer-card
                icon: mdi-printer-settings
                href: http://10.8.28.100
                statusStyle: "dot"
                ping: 10.8.28.100
                description: "MX-2651 管理頁面"
            - AD Web-103:
                id: ad103-card
                icon: mdi-microsoft-windows
                href: http://10.8.128.103/
            - AD Web-105:
                id: ad105-card
                icon: mdi-microsoft-windows
                href: http://10.8.128.105/

  custom.css: |
    /* --- 1. 全域滾輪隱藏 --- */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- 2. 圓角與基礎質感 (增加毛玻璃與細邊框) --- */
    .service-card, .bookmark-card, .group-header,
    div[id$="-card"], div[id$="-card"] > div,
    div[class*="rounded-lg"] {
        border-radius: 25px !important;
        overflow: hidden !important;
        isolation: isolate !important;
    }

    .service-card {
        background-color: rgba(255, 255, 255, 0.02) !important;
        backdrop-filter: blur(10px) !important; /* 增加通透感 */
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }

    /* --- 3. 卡片著色容器設定 --- */
    #argocd-card, #rancher-card, #grafana-card, #prometheus-card, #jenkins-card, #lam-card,
    #fortigate-card, #paloalto-card, #omada-card, #cloudflare-card, #godaddy-card,
    #vcenter-card, #esxi12-card, #esxi16-card, #nas244-card, #nas245-card,
    #uptime-card, #librenms-card, #assettiger-card, #bitwarden-card,
    #pbx-card, #printer-card, #ad103-card, #ad105-card {
        position: relative !important;
        background-color: transparent !important;
    }

    /* 關鍵：降低透明度 (0.35 -> 0.15) 讓顏色不刺眼 */
    [id$="-card"]::before {
        content: "";
        position: absolute;
        top: 0px;
        left: 0px;
        right: 0px;
        bottom: 4px; /* 底部偏移營造立體感 */
        z-index: 0;
        border-radius: 23px !important;
        opacity: 0.15 !important; 
    }

    /* --- 4. 服務顏色分配 (改為更高質感的色偏) --- */
    /* 紫色 (CI/CD) */
    #argocd-card::before, #rancher-card::before, #jenkins-card::before, #lam-card::before { background-color: #a855f7 !important; }
    /* 藍色 (監控) */
    #grafana-card::before, #prometheus-card::before, #librenms-card::before { background-color: #3b82f6 !important; }
    /* 紅色 (網路) */
    #fortigate-card::before, #paloalto-card::before, #cloudflare-card::before { background-color: #ef4444 !important; }
    /* 橘色 (虛擬化) */
    #vcenter-card::before, #esxi12-card::before, #esxi16-card::before { background-color: #f59e0b !important; }
    /* 綠色 (儲存/狀態) */
    #nas244-card::before, #nas245-card::before, #uptime-card::before { background-color: #10b981 !important; }
    /* 灰藍 (周邊) */
    #pbx-card::before, #printer-card::before, #ad103-card::before, #ad105-card::before, #bitwarden-card::before, #assettiger-card::before { background-color: #94a3b8 !important; }

    /* --- 5. 狀態標籤微縮 (讓畫面更緊湊精緻) --- */
    .service-card > div { position: relative; z-index: 1; padding: 0.8rem !important; }

    .service-ping .ping-status {
        background-color: rgba(0, 0, 0, 0.25) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 6px !important;
        padding: 1px 5px !important;
        position: absolute !important;
        top: 10px !important;
        right: 10px !important;
    }

    .service-ping .ping-status div {
        font-size: 8px !important;
        font-weight: 900 !important;
        letter-spacing: 0.02em;
    }

    /* --- 6. 頂部導航藥丸樣式 --- */
    #tabs ul {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border-radius: 50px !important;
        padding: 4px !important;
        margin: 0 auto 1.5rem auto !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }

    #tabs ul li button[aria-selected="true"] {
        background-color: rgba(255, 255, 255, 0.15) !important;
        color: #fff !important;
        border-radius: 50px !important;
    }

    /* --- 7. 進度條優化 --- */
    .information-widget-resource div[style*="width"] {
        background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899) !important;
        opacity: 0.8 !important;
        border-radius: 10px !important;
    }

    /* --- 8. 字體細節修正 --- */
    .service-name { 
        color: #ffffff !important; 
        font-weight: 700 !important; 
        font-size: 0.95rem !important; 
        letter-spacing: -0.01em;
    }
    .service-description { 
        color: rgba(255, 255, 255, 0.4) !important; 
        font-size: 0.75rem !important;
        margin-top: -2px;
    }
  bookmarks.yaml: ""
  custom.yaml: ""
