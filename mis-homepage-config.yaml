                icon: si-synology
                href: http://10.8.100.244:5000
                widget:
                  type: diskstation
                  url: http://10.8.100.244:5000
                  username: hsadmin
                  password: 'm:i(t''G4'
            - Synology-245:
                id: nas245-card
                icon: si-synology
                href: http://10.8.100.245:5000
                widget:
                  type: diskstation
