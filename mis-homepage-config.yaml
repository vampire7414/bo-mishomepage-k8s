  custom.css: |
    /* --- 1. 全域滾輪隱藏 --- */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- 2. 圓角與基礎質感 (修正巨大化問題) --- */
    .service-card, .bookmark-card,
    div[id$="-card"], div[id$="-card"] > div {
        border-radius: 20px !important; /* 稍微縮小圓角讓小卡片更協調 */
        overflow: hidden !important;
        isolation: isolate !important;
    }

    .service-card {
        background-color: rgba(255, 255, 255, 0.03) !important;
        backdrop-filter: blur(10px) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
        min-height: 50px !important; /* 強制設定最小高度，防止異常撐大 */
        transition: all 0.2s ease !important;
    }

    /* 核心修正：縮減內邊距，解決區塊巨大化 */
    .service-card > div {
        position: relative;
        z-index: 1;
        padding: 0.6rem 0.8rem !important; /* 大幅縮小內距 (原先可能被設為 1.2rem) */
    }

    /* --- 3. 卡片著色背景 (維持偏移層次感) --- */
    [id$="-card"] {
        position: relative !important;
        background-color: transparent !important;
    }

    [id$="-card"]::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        right: 2px;
        bottom: 4px; /* 底部偏移，營造陰影感 */
        z-index: 0;
        border-radius: 18px !important;
        opacity: 0.15 !important; /* 保持低飽和的清透感 */
    }

    /* --- 4. 服務顏色分配 (沿用您的 MIS 配色) --- */
    #argocd-card::before, #rancher-card::before, #jenkins-card::before, #lam-card::before { background-color: #8b5cf6 !important; }
    #grafana-card::before, #prometheus-card::before, #uptime-card::before, #librenms-card::before { background-color: #0ea5e9 !important; }
    #fortigate-card::before, #paloalto-card::before, #cloudflare-card::before { background-color: #f43f5e !important; }
    #vcenter-card::before, #esxi12-card::before, #esxi16-card::before { background-color: #f59e0b !important; }
    #nas244-card::before, #nas245-card::before, #assettiger-card::before { background-color: #10b981 !important; }
    #pbx-card::before, #printer-card::before, #ad103-card::before, #ad105-card::before, #bitwarden-card::before { background-color: #64748b !important; }

    /* --- 5. 重新定位微型 Ping 標籤 --- */
    .service-ping .ping-status {
        background-color: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 5px !important;
        padding: 1px 4px !important;
        position: absolute !important;
        top: 8px !important;
        right: 8px !important;
    }

    .service-ping .ping-status div {
        font-size: 8px !important; /* 縮小文字，讓視覺更精緻 */
        font-weight: 800 !important;
        text-transform: uppercase !important;
        color: rgba(255, 255, 255, 0.8) !important;
    }

    /* --- 6. 字體與資訊佈局修正 --- */
    .service-name { 
        font-size: 0.95rem !important; /* 縮小標題防止撐大區塊 */
        font-weight: 700 !important; 
        color: #ffffff !important;
    }
    
    .service-description { 
        color: rgba(255, 255, 255, 0.5) !important; 
        font-size: 0.75rem !important;
    }

    /* 針對 Widget (如 Rancher/ArgoCD) 內部資訊的微縮 */
    .service-card .widget-data {
        font-size: 0.7rem !important;
        gap: 0.5rem !important;
    }

    /* --- 7. 頂部導航藥丸欄 (保持簡約) --- */
    #tabs ul {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border-radius: 50px !important;
        padding: 4px !important;
        margin-bottom: 15px !important;
    }

  bookmarks.yaml: ""
  custom.yaml: ""
