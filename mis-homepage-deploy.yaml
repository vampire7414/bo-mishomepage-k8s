apiVersion: apps/v1
kind: Deployment
metadata:
  name: mishomepage
  namespace: mishomepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mishomepage
  template:
    metadata:
      annotations:
        # 每次修改 ConfigMap 後，記得更新這裡的 hash 或版本號，強制 Pod 重啟載入新檔案
        config-hash: "reddit-style-v14" 
      labels:
        app: mishomepage
    spec:
      serviceAccountName: homepage-admin
      containers:
      - name: mishomepage
        image: ghcr.io/gethomepage/homepage:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "*"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        volumeMounts:
        - name: mis-config-volume
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: mis-config-volume
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: mis-config-volume
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: mis-config-volume
          mountPath: /app/config/bookmarks.yaml
          subPath: bookmarks.yaml
        - name: mis-config-volume
          mountPath: /app/config/custom.yaml
          subPath: custom.yaml
        - name: mis-config-volume
          mountPath: /app/config/kubernetes.yaml
          subPath: kubernetes.yaml
        # --- 關鍵：必須掛載這個檔案 ---
        - name: mis-config-volume
          mountPath: /app/config/custom.css
          subPath: custom.css
        # --------------------------
        - name: logs-volume
          mountPath: /app/config/logs
      volumes:
      - name: mis-config-volume
        configMap:
          name: mis-homepage-config
      - name: logs-volume
        emptyDir: {}
